name: Docs

# Trigger the workflow only when files that actually affect the rendered
# site change.  Since VALAX does not use mkdocstrings or any other
# Python-driven doc generation, changes under ``valax/`` never alter the
# built site and would only waste CI minutes.
#
# The site content depends solely on:
#   * everything under ``docs/`` (page sources),
#   * ``mkdocs.yml`` (nav, theme, extensions),
#   * ``pyproject.toml`` (the ``[docs]`` extras version pin — a
#     mkdocs-material bump can break the build),
#   * this workflow file itself.
#
# On ``push`` to ``main`` we build **and** deploy; on ``pull_request``
# we build with ``--strict`` only, so anchor mismatches and broken
# cross-references are caught before merge.

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'pyproject.toml'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'pyproject.toml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git-revision-date plugins, if added later

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Build site
        run: mkdocs build --strict

      - name: Upload Pages artifact
        # Only upload on push-to-main; on PRs we just want the strict
        # build check, not a deploy.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    # Skip the deploy job entirely on PRs and non-main pushes.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
