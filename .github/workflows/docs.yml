name: Docs

# Trigger the workflow only when files that actually affect the rendered
# site change.  The API reference pages under ``docs/api/`` embed
# ``mkdocstrings`` ``:::`` directives that pull docstrings live from
# ``valax/``, so any source-side docstring or signature change can also
# alter the built site.
#
# The site content depends on:
#   * everything under ``docs/`` (page sources),
#   * everything under ``valax/`` (docstrings + signatures rendered by
#     mkdocstrings on the API pages),
#   * ``mkdocs.yml`` (nav, theme, extensions, mkdocstrings config),
#   * ``pyproject.toml`` (the ``[docs]`` extras version pin — a
#     mkdocs-material / mkdocstrings bump can break the build),
#   * this workflow file itself.
#
# On ``push`` to ``main`` we build **and** deploy; on ``pull_request``
# we build with ``--strict`` only, so anchor mismatches, broken
# cross-references, and stale mkdocstrings references are caught before
# merge.

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'valax/**'
      - 'mkdocs.yml'
      - 'pyproject.toml'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'valax/**'
      - 'mkdocs.yml'
      - 'pyproject.toml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git-revision-date plugins, if added later

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Build site
        run: mkdocs build --strict

      - name: Upload Pages artifact
        # Only upload on push-to-main; on PRs we just want the strict
        # build check, not a deploy.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    # Skip the deploy job entirely on PRs and non-main pushes.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
