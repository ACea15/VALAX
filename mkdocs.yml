site_name: VALAX
site_description: JAX-native quantitative finance valuation engine
site_url: https://acea.github.io/valax/
repo_url: https://github.com/acea/valax
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - toc.follow

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - pymdownx.details
  - attr_list
  - tables
  - toc:
      permalink: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Examples: examples.md
  - Architecture: architecture.md
  - Models & Theory: theory.md
  - Roadmap: roadmap.md
  - Benchmarks: benchmarks.md
  - User Guide:
      - Instruments Overview: guide/instruments.md
      - Analytical Pricing: guide/analytical.md
      - Yield Curves & Bootstrapping: guide/curves.md
      - Fixed Income: guide/fixed-income.md
      - Callable/Puttable/FRN/Convertible Bonds: guide/callable-bonds.md
      - Short-Rate Models: guide/short-rate.md
      - FX Derivatives: guide/fx.md
      - Inflation Derivatives: guide/inflation.md
      - Interest Rate Exotics: guide/rates-exotics.md
      - Equity Exotics: guide/equity-exotics.md
      - Credit Derivatives: guide/credit.md
      - Greeks via Autodiff: guide/greeks.md
      - Monte Carlo: guide/monte-carlo.md
      - PDE Solvers: guide/pde.md
      - Binomial Trees: guide/lattice.md
      - Calibration: guide/calibration.md
      - Volatility Surfaces: guide/vol-surfaces.md
      - Risk & Scenarios: guide/risk.md
  - API Reference:
      - Instruments: api/instruments.md
      - Pricing: api/pricing.md
      - Dates: api/dates.md
      - Curves: api/curves.md
      - Greeks: api/greeks.md
      - Models: api/models.md
      - Calibration: api/calibration.md
      - Surfaces: api/surfaces.md
      - Risk: api/risk.md
