site_name: VALAX
site_description: JAX-native quantitative finance valuation engine
repo_url: https://github.com/acea/valax

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - toc.follow

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - pymdownx.details
  - attr_list
  - tables
  - toc:
      permalink: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - User Guide:
      - Analytical Pricing: guide/analytical.md
      - Fixed Income: guide/fixed-income.md
      - Greeks via Autodiff: guide/greeks.md
      - Monte Carlo: guide/monte-carlo.md
      - PDE Solvers: guide/pde.md
      - Binomial Trees: guide/lattice.md
      - Calibration: guide/calibration.md
  - API Reference:
      - Instruments: api/instruments.md
      - Pricing: api/pricing.md
      - Dates: api/dates.md
      - Curves: api/curves.md
      - Greeks: api/greeks.md
      - Models: api/models.md
      - Calibration: api/calibration.md
